<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Email AI Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #1f2937;
        }

        header {
            background: #111827;
            color: white;
            padding: 18px 28px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        .unlock-box {
            max-width: 520px;
            margin: 70px auto;
            background: white;
            padding: 26px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .unlock-box input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-size: 16px;
            margin: 12px 0;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 11px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .topbar {
            padding: 16px 28px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .small {
            color: #666;
            font-size: 14px;
        }

        .search-box {
            margin-left: auto;
            padding: 9px 12px;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            min-width: 280px;
            font-size: 14px;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: calc(100% - 40px);
            margin: 20px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #e5e7eb;
            text-align: left;
            padding: 12px 10px;
            font-size: 13px;
            color: #111827;
        }

        td {
            border-top: 1px solid #eeeeee;
            padding: 14px 10px;
            vertical-align: top;
            font-size: 14px;
        }

        tr:nth-child(even) {
            background: #fafafa;
        }

        tr:hover {
            background: #f1f5f9;
        }

        .priority-high td:first-child {
            border-left: 5px solid #dc2626;
        }

        .priority-medium td:first-child {
            border-left: 5px solid #f59e0b;
        }

        .priority-low td:first-child {
            border-left: 5px solid #22c55e;
        }

        .account-cell {
            font-weight: bold;
            white-space: nowrap;
        }

        .sender {
            max-width: 250px;
            word-break: break-word;
        }

        .subject {
            max-width: 330px;
            font-weight: bold;
            line-height: 1.35;
        }

        .summary {
            max-width: 520px;
            line-height: 1.45;
        }

        .action {
            max-width: 360px;
            line-height: 1.45;
        }

        .category {
            display: inline-block;
            background: #eef2ff;
            color: #3730a3;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #e5e7eb;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
        }

        .badge.high {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.medium {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.low {
            background: #dcfce7;
            color: #166534;
        }

        .details-btn {
            background: #111827;
            color: white;
            border: none;
            padding: 8px 11px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .details-btn:hover {
            background: #374151;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 99;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.55);
        }

        .modal-content {
            background: white;
            margin: 35px auto;
            padding: 26px;
            width: 82%;
            max-width: 1150px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .modal-content h2 {
            margin-top: 0;
            padding-right: 90px;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 4px 24px;
            background: #f9fafb;
            padding: 12px 16px;
            border-radius: 8px;
        }

        .modal-meta p {
            margin: 5px 0;
            word-break: break-word;
        }

        .modal-summary {
            background: #eef2ff;
            padding: 14px 16px;
            border-radius: 8px;
            line-height: 1.45;
            margin-bottom: 18px;
        }

        .modal-content pre {
            white-space: pre-wrap;
            font-family: Arial, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            background: #f9fafb;
            padding: 18px;
            border-radius: 8px;
            max-height: 65vh;
            overflow: auto;
        }

        .close {
            float: right;
            background: #dc2626;
            color: white;
            border: none;
            padding: 9px 13px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .close:hover {
            background: #b91c1c;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #991b1b;
            font-weight: bold;
            margin-top: 12px;
        }
    </style>
</head>

        function escapeHtml(text) {
            return String(text ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function b64ToBytes(b64) {
            const binary = atob(b64);
            const bytes = new Uint8Array(binary.length);

            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }

            return bytes;
        }

        async function deriveKey(password, salt, iterations) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw",
                encoder.encode(password),
                "PBKDF2",
                false,
                ["deriveKey"]
            );

            return crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: salt,
                    iterations: iterations,
                    hash: "SHA-256"
                },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["decrypt"]
            );
        }

        async function decryptRows(password) {
            const salt = b64ToBytes(encryptedPackage.salt);
            const iv = b64ToBytes(encryptedPackage.iv);
            const ciphertext = b64ToBytes(encryptedPackage.ciphertext);
            const key = await deriveKey(password, salt, encryptedPackage.iterations);

            const plaintextBuffer = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key,
                ciphertext
            );

            const decoder = new TextDecoder();
            return JSON.parse(decoder.decode(plaintextBuffer));
        }

        function badge(value) {
            const text = String(value ?? "");
            const lower = text.toLowerCase();

            let cls = "badge";

            if (["high", "true", "yes"].includes(lower)) {
                cls = "badge high";
            } else if (lower === "medium") {
                cls = "badge medium";
            } else if (["low", "false", "no"].includes(lower)) {
                cls = "badge low";
            }

            return `<span class="${cls}">${escapeHtml(text)}</span>`;
        }

        function renderDashboard(rows) {
            const tableBody = document.getElementById("tableBody");
            const modals = document.getElementById("modals");

            tableBody.innerHTML = "";
            modals.innerHTML = "";

            rows.forEach((row, index) => {
                const rowId = "details_" + index;
                const priority = String(row.priority || "low").toLowerCase();
                const category = String(row.category || "other").toLowerCase();

                tableBody.innerHTML += `
                    <tr class="priority-${escapeHtml(priority)}">
                        <td class="account-cell">${escapeHtml(row.account)}</td>
                        <td>${escapeHtml(row.mailbox || row.to)}</td>
                        <td class="sender">${escapeHtml(row.from)}</td>
                        <td class="subject">${escapeHtml(row.subject)}</td>
                        <td>${badge(row.useful)}</td>
                        <td>${badge(row.priority)}</td>
                        <td><span class="category">${escapeHtml(category)}</span></td>
                        <td class="summary">${escapeHtml(row.summary)}</td>
                        <td class="action">
                            ${escapeHtml(row.recommended_action)}
                            <br><br>
                            <button class="details-btn" onclick="openModal('${rowId}')">Open full email</button>
                        </td>
                    </tr>
                `;

                modals.innerHTML += `
                    <div id="${rowId}" class="modal">
                        <div class="modal-content">
                            <button class="close" onclick="closeModal('${rowId}')">Close</button>
                            <h2>${escapeHtml(row.subject)}</h2>

                            <div class="modal-meta">
                                <p><b>Account:</b> ${escapeHtml(row.account)}</p>
                                <p><b>Mailbox:</b> ${escapeHtml(row.mailbox)}</p>
                                <p><b>From:</b> ${escapeHtml(row.from)}</p>
                                <p><b>To:</b> ${escapeHtml(row.to)}</p>
                                <p><b>Date:</b> ${escapeHtml(row.date)}</p>
                                <p><b>Category:</b> ${escapeHtml(row.category)}</p>
                                <p><b>Priority:</b> ${escapeHtml(row.priority)}</p>
                            </div>

                            <hr>

                            <h3>AI summary</h3>
                            <div class="modal-summary">${escapeHtml(row.summary)}</div>

                            <h3>Full email text</h3>
                            <pre>${escapeHtml(row.original_body)}</pre>
                        </div>
                    </div>
                `;
            });

            document.getElementById("rowCount").innerText = "Rows: " + rows.length;
        }

        async function unlockReport() {
            const password = document.getElementById("passwordInput").value;
            const errorBox = document.getElementById("errorBox");
            errorBox.innerText = "";

            try {
                const rows = await decryptRows(password);
                document.getElementById("unlockBox").classList.add("hidden");
                document.getElementById("dashboard").classList.remove("hidden");
                renderDashboard(rows);
            } catch (e) {
                errorBox.innerText = "Wrong password or damaged report.";
            }
        }

        function openModal(id) {
            document.getElementById(id).style.display = "block";
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target.classList.contains("modal")) {
                event.target.style.display = "none";
            }
        }

        function filterTable() {
            const input = document.getElementById("searchBox");
            const filter = input.value.toLowerCase();
            const table = document.getElementById("emailTable");
            const rows = table.getElementsByTagName("tr");

            for (let i = 1; i < rows.length; i++) {
                const text = rows[i].innerText.toLowerCase();
                rows[i].style.display = text.includes(filter) ? "" : "none";
            }
        }
    </script>
